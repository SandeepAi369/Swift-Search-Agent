<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swift Search</title>
  <meta name="description" content="Ultra-fast meta-search with deep research and AI synthesis" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #191a1f;
      --bg-2: #1e2025;
      --bg-3: #232429;
      --surface: #27282e;
      --surface-2: #2c2e34;
      --ink: #ececf1;
      --ink-2: #c5c5d2;
      --muted: #8e8ea0;
      --border: rgba(255,255,255,.08);
      --border-2: rgba(255,255,255,.12);
      --accent: #20b2aa;
      --accent-2: #5ac8c8;
      --accent-bg: rgba(32,178,170,.08);
      --blue: #528bff;
      --r: 12px;
      --r-sm: 8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;color:var(--ink);font-family:"Inter",system-ui,sans-serif;background:var(--bg);-webkit-font-smoothing:antialiased}
    a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    @keyframes slideRight{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(32,178,170,0)}50%{box-shadow:0 0 12px 3px rgba(32,178,170,.2)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes bounce3{0%,100%{transform:scaleY(.6)}50%{transform:scaleY(1.2)}}
    .hidden{display:none!important}

    /* ═══ Layout ═══ */
    .app{display:flex;flex-direction:column;min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
    .topbar-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--ink);cursor:pointer}
    .topbar-brand svg{width:22px;height:22px}
    .topbar-actions{display:flex;align-items:center;gap:8px}
    .icon-btn{background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 10px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
    .icon-btn:hover{border-color:var(--border-2);color:var(--ink-2);background:var(--bg-3)}
    .icon-btn svg{width:14px;height:14px}

    /* ═══ Center ═══ */
    .center-wrap{flex:1;display:flex;flex-direction:column;max-width:820px;width:100%;margin:0 auto;padding:0 20px}

    /* ═══ Home ═══ */
    .home-hero{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 0}
    .home-title{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:24px;color:var(--ink)}

    /* ═══ Search box — always visible ═══ */
    .search-wrap{width:100%;max-width:820px;margin:0 auto}
    .search-row{display:flex;align-items:center;gap:12px}
    .search-input{flex:1;padding:16px 20px;font-size:16px;font-family:inherit;font-weight:400;background:var(--surface);border:1px solid var(--border-2);border-radius:16px;color:var(--ink);outline:none;transition:border .25s,box-shadow .25s}
    .search-input::placeholder{color:var(--muted)}
    .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(32,178,170,.12)}
    .search-submit{flex-shrink:0;background:var(--accent);border:none;border-radius:14px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
    .search-submit:hover{background:var(--accent-2);transform:scale(1.08);box-shadow:0 4px 20px rgba(32,178,170,.3)}
    .search-submit:active{transform:scale(.95)}
    .search-submit:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
    .search-submit svg{width:20px;height:20px;color:#fff}

    /* ═══ Mode bar — always visible under search ═══ */
    .mode-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;justify-content:center}
    .mode-chip{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s;user-select:none}
    .mode-chip:hover{border-color:var(--border-2);color:var(--ink-2);transform:translateY(-1px)}
    .mode-chip.active{background:var(--accent-bg);border-color:rgba(32,178,170,.3);color:var(--accent)}

    /* ═══ Status bar ═══ */
    .status-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px;margin-top:10px;font-size:12px;color:var(--muted);animation:fadeIn .3s ease-out both}
    .status-bar .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:spin .6s linear infinite}
    .status-item{display:flex;align-items:center;gap:4px}
    .status-item svg{width:12px;height:12px}
    .status-val{color:var(--accent);font-weight:600}

    /* ═══ Progress ═══ */
    .progress-track{width:100%;height:3px;background:var(--surface);border-radius:4px;overflow:hidden;margin-top:10px}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:4px;transition:width .5s ease-out;width:0}

    /* ═══ Results ═══ */
    .results-area{padding:20px 0 30px;animation:fadeUp .35s ease-out both}

    /* Sources strip */
    .sources-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px}
    .sources-strip::-webkit-scrollbar{height:3px}
    .sources-strip::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
    .src-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;color:var(--ink-2);text-decoration:none;transition:all .2s;max-width:200px}
    .src-chip:hover{border-color:var(--accent);text-decoration:none;background:var(--bg-3)}
    .src-chip img{width:16px;height:16px;border-radius:3px}
    .src-chip span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .src-num{color:var(--muted);font-size:10px;font-weight:600;min-width:16px}

    /* Answer */
    .answer-area{animation:fadeUp .4s ease-out .1s both}
    .answer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .answer-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent)}
    .answer-label svg{width:16px;height:16px}
    .answer-content{font-size:15px;line-height:1.85;color:var(--ink);word-break:break-word}
    .answer-content p{margin-bottom:12px}
    .answer-content h2,.answer-content h3{font-size:16px;font-weight:600;margin:18px 0 8px;color:var(--ink)}
    .answer-content ul,.answer-content ol{margin:6px 0 12px 20px}
    .answer-content li{margin-bottom:4px}
    .answer-content code{background:var(--bg-3);padding:1px 5px;border-radius:4px;font-size:13px}
    .answer-loading{display:flex;align-items:center;gap:10px;padding:16px 0;color:var(--muted);font-size:14px}

    /* TTS button */
    .tts-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
    .tts-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
    .tts-btn.playing{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
    .tts-btn svg{width:14px;height:14px}
    .eq-bars{display:flex;gap:2px;align-items:end;height:12px}
    .eq-bar{width:2px;background:var(--accent);border-radius:1px;animation:bounce3 .5s ease-in-out infinite}
    .eq-bar:nth-child(2){animation-delay:.1s;height:10px}
    .eq-bar:nth-child(3){animation-delay:.2s;height:6px}

    /* All sources */
    .all-sources{margin-top:20px}
    .all-sources-toggle{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 14px;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
    .all-sources-toggle:hover{border-color:var(--border-2);color:var(--ink-2)}
    .all-sources-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    @media(max-width:640px){.all-sources-grid{grid-template-columns:1fr}}
    .all-src-card{padding:10px;border:1px solid var(--border);border-radius:var(--r-sm);transition:all .15s}
    .all-src-card:hover{border-color:var(--accent);background:var(--bg-3)}
    .all-src-card a{font-size:13px;font-weight:500;color:var(--ink);display:block;line-height:1.4}
    .all-src-card .meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:6px}

    .llm-err{margin-top:12px;padding:10px 14px;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);border-radius:var(--r-sm);font-size:12px;color:#f87171}

    /* ═══ Settings Drawer ═══ */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;animation:fadeIn .15s ease-out both}
    .drawer{position:fixed;top:0;right:0;bottom:0;width:360px;max-width:90vw;background:var(--bg-2);border-left:1px solid var(--border);padding:20px;z-index:101;overflow-y:auto}
    .drawer-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
    .drawer-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px}
    .drawer-close:hover{color:var(--ink)}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
    .field input,.field select{width:100%;padding:8px 10px;font-size:13px;font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--ink);outline:none}
    .field input:focus,.field select:focus{border-color:var(--accent)}
    .field-row{display:flex;gap:8px}
    .field-row .field{flex:1}
    .check-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;color:var(--ink-2);cursor:pointer}
    .check-row input{width:16px;height:16px;accent-color:var(--accent)}
    .btn-fetch{padding:5px 10px;font-size:11px;background:var(--accent-bg);border:1px solid rgba(32,178,170,.2);border-radius:6px;color:var(--accent);cursor:pointer;transition:all .15s}
    .btn-fetch:hover{background:rgba(32,178,170,.15)}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease-out both}
    .modal-box{background:var(--bg-2);border:1px solid var(--border-2);border-radius:16px;padding:28px 32px;max-width:400px;width:90%;text-align:center;animation:fadeUp .25s ease-out both}
    .modal-icon{font-size:32px;margin-bottom:10px}
    .modal-title{font-size:17px;font-weight:700;margin-bottom:6px}
    .modal-text{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px}
    .modal-actions{display:flex;gap:8px;justify-content:center}
    .modal-btn{padding:9px 24px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
    .modal-btn-primary{background:var(--accent);color:#fff}
    .modal-btn-primary:hover{background:var(--accent-2)}
    .modal-btn-ghost{background:transparent;border:1px solid var(--border-2);color:var(--muted)}
    .modal-btn-ghost:hover{color:var(--ink)}

    /* Mode dropdown in topbar */
    .mode-dropdown{position:relative;display:inline-block}
    .mode-dropdown-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s}
    .mode-dropdown-btn:hover{border-color:var(--border-2);color:var(--ink-2);background:var(--bg-3)}
    .mode-dropdown-btn .mode-label{color:var(--accent);font-weight:600}
    .mode-menu{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg-2);border:1px solid var(--border-2);border-radius:var(--r);padding:6px;min-width:180px;z-index:50;animation:fadeUp .15s ease-out both;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .mode-menu-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:13px;color:var(--ink-2);cursor:pointer;transition:all .1s;border:none;background:transparent;width:100%;text-align:left}
    .mode-menu-item:hover{background:var(--surface);color:var(--ink)}
    .mode-menu-item.active{background:var(--accent-bg);color:var(--accent)}
    .mode-menu-item .mode-icon{font-size:14px;width:20px;text-align:center}

    .skel{background:linear-gradient(90deg,var(--surface) 25%,var(--surface-2) 50%,var(--surface) 75%);background-size:400% 100%;animation:shimmer 1.8s linear infinite;border-radius:4px;height:14px;margin-bottom:8px}
    .skel.w30{width:30%}.skel.w50{width:50%}.skel.w70{width:70%}.skel.w90{width:90%}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border-2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  </style>
</head>
<body>
  <div id="dbModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-icon">🗄️</div>
      <div class="modal-title">Enable Search History?</div>
      <div class="modal-text">Save search queries and AI answers locally.<br><code style="color:var(--accent);font-size:11px">~/.swift-search/history.json</code></div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-primary" onclick="initHistory(true)">Yes</button>
        <button class="modal-btn modal-btn-ghost" onclick="initHistory(false)">No</button>
      </div>
    </div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="topbar-brand" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Swift Search
      </div>
      <div class="topbar-actions">
        <div class="mode-dropdown">
          <button class="mode-dropdown-btn" onclick="toggleModeMenu()">
            <span id="modeIcon">⚡</span>
            <span id="modeLabelBtn" class="mode-label">Lite</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="modeMenu" class="mode-menu hidden">
            <button class="mode-menu-item active" data-mode="lite" onclick="selectMode(this)"><span class="mode-icon">⚡</span>Lite</button>
            <button class="mode-menu-item" data-mode="research" onclick="selectMode(this)"><span class="mode-icon">🔬</span>Deep Research</button>
            <button class="mode-menu-item" data-mode="academic" onclick="selectMode(this)"><span class="mode-icon">🎓</span>Academic</button>
            <button class="mode-menu-item" data-mode="reddit" onclick="selectMode(this)"><span class="mode-icon">💬</span>Reddit</button>
            <button class="mode-menu-item" data-mode="youtube" onclick="selectMode(this)"><span class="mode-icon">▶</span>YouTube</button>
          </div>
        </div>
        <button class="icon-btn" onclick="toggleHistory()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          History
        </button>
        <button class="icon-btn" onclick="openSettings()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Settings
        </button>
      </div>
    </header>

    <div class="center-wrap">
      <!-- Home hero (only shown before first search) -->
      <section id="homeView" class="home-hero">
        <div class="home-title">What do you want to know?</div>
      </section>

      <!-- SEARCH BOX — always visible, centered -->
      <div id="searchSection" class="search-wrap" style="padding:16px 0">
        <div class="search-row">
          <input id="queryInput" class="search-input" type="text" placeholder="Ask anything..." autofocus />
          <button id="runBtn" class="search-submit" onclick="runSearch()" title="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="mode-row" id="modeBar">
          <button class="mode-chip active" data-mode="lite">⚡ Lite</button>
          <button class="mode-chip" data-mode="research">🔬 Deep Research</button>
          <button class="mode-chip" data-mode="academic">🎓 Academic</button>
          <button class="mode-chip" data-mode="reddit">💬 Reddit</button>
          <button class="mode-chip" data-mode="youtube">▶ YouTube</button>
        </div>
        <!-- Status bar -->
        <div id="statusBar" class="status-bar hidden">
          <span class="spinner" style="width:12px;height:12px;border-width:1.5px"></span>
          <span id="statusText">Searching...</span>
          <span class="status-item"><span id="statusTime" class="status-val">0s</span></span>
          <span class="status-item"><span id="statusMode" class="status-val">lite</span></span>
        </div>
        <div id="progressTrack" class="progress-track hidden"><div id="progressFill" class="progress-fill"></div></div>
      </div>

      <!-- RESULTS — appears below search box -->
      <section id="resultsArea" class="results-area hidden">
        <div id="sourcesStrip" class="sources-strip"></div>

        <div class="answer-area">
          <div class="answer-header">
            <div class="answer-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 01-2 2h-4a2 2 0 01-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/><line x1="9" y1="21" x2="15" y2="21"/></svg>
              Answer
            </div>
            <button id="ttsBtn" class="tts-btn hidden" onclick="toggleTTS()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
              <span id="ttsLabel">Listen</span>
            </button>
          </div>
          <div id="answerContent" class="answer-content"></div>
          <div id="llmError" class="llm-err hidden"></div>
        </div>

        <div class="all-sources" id="allSourcesWrap">
          <button class="all-sources-toggle" onclick="toggleAllSources()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            View all sources <span id="allSourcesCount">0</span>
          </button>
          <div id="allSourcesGrid" class="all-sources-grid hidden"></div>
        </div>
      </section>
    </div>
  </div>

  <!-- Settings Drawer -->
  <div id="drawerOverlay" class="drawer-overlay hidden" onclick="closeSettings()"></div>
  <div id="settingsDrawer" class="drawer hidden">
    <div class="drawer-title">Settings <button class="drawer-close" onclick="closeSettings()">✕</button></div>
    <div class="field">
      <label>Provider</label>
      <select id="provider">
        <option value="cerebras">Cerebras</option>
        <option value="groq">Groq</option>
        <option value="openai">OpenAI</option>
        <option value="openai_compatible">OpenAI Compatible</option>
        <option value="anthropic">Anthropic</option>
        <option value="gemini">Gemini</option>
        <option value="xai">xAI (Grok)</option>
        <option value="deepseek">DeepSeek</option>
        <option value="ollama">Ollama</option>
        <option value="openrouter">OpenRouter</option>
        <option value="together">Together AI</option>
        <option value="fireworks">Fireworks AI</option>
        <option value="sambanova">SambaNova</option>
        <option value="nvidia_nim">NVIDIA NIM</option>
      </select>
    </div>
    <div class="field"><label>API Key</label><input id="apiKey" type="password" placeholder="sk-..." /></div>
    <div class="field-row">
      <div class="field"><label>Base URL</label><input id="baseUrl" type="text" placeholder="auto" /></div>
      <div class="field">
        <label>Model <button class="btn-fetch" id="fetchBtn" onclick="fetchModels()">⟳ Fetch</button></label>
        <input id="modelInput" type="text" placeholder="model" />
        <select id="modelSelect" class="hidden" style="margin-top:4px"></select>
      </div>
    </div>
    <label class="check-row"><input id="enableLlm" type="checkbox" checked /> Enable AI Synthesis</label>
    <div class="field" style="margin-top:12px">
      <label>Max Results (Lite mode)</label>
      <input id="maxResults" type="number" value="30" min="5" max="900" />
    </div>
    <button class="modal-btn modal-btn-primary" style="width:100%;margin-top:12px" onclick="saveSettings();closeSettings()">Save & Close</button>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const dom = {
      queryInput:$('queryInput'), runBtn:$('runBtn'),
      homeView:$('homeView'), resultsArea:$('resultsArea'),
      sourcesStrip:$('sourcesStrip'),
      answerContent:$('answerContent'), llmError:$('llmError'),
      allSourcesCount:$('allSourcesCount'), allSourcesGrid:$('allSourcesGrid'),
      statusBar:$('statusBar'), statusText:$('statusText'),
      statusTime:$('statusTime'), statusMode:$('statusMode'),
      progressTrack:$('progressTrack'), progressFill:$('progressFill'),
      ttsBtn:$('ttsBtn'), ttsLabel:$('ttsLabel'),
      provider:$('provider'), apiKey:$('apiKey'), baseUrl:$('baseUrl'),
      modelInput:$('modelInput'), modelSelect:$('modelSelect'),
      enableLlm:$('enableLlm'), maxResults:$('maxResults'),
      drawerOverlay:$('drawerOverlay'), settingsDrawer:$('settingsDrawer'),
      dbModal:$('dbModal'), modeBar:$('modeBar'),
    };

    let focusMode = 'lite';
    let historyEnabled = false;
    let searchTimer = null;
    let searchStartTime = 0;
    let progressInterval = null;
    let currentAnswer = '';      // For TTS
    let ttsPlaying = false;

    // Presets
    const presets = {
      cerebras:{base:'https://api.cerebras.ai/v1',model:'llama-3.3-70b'},
      groq:{base:'https://api.groq.com/openai/v1',model:'llama-3.3-70b-versatile'},
      openai:{base:'',model:'gpt-4o-mini'},
      openai_compatible:{base:'',model:''},
      anthropic:{base:'',model:'claude-3-5-haiku-latest'},
      gemini:{base:'',model:'gemini-2.0-flash'},
      xai:{base:'https://api.x.ai/v1',model:'grok-2-latest'},
      deepseek:{base:'https://api.deepseek.com/v1',model:'deepseek-chat'},
      ollama:{base:'http://localhost:11434/v1',model:'llama3'},
      openrouter:{base:'https://openrouter.ai/api/v1',model:'openai/gpt-4o-mini'},
      together:{base:'https://api.together.xyz/v1',model:'meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo'},
      fireworks:{base:'https://api.fireworks.ai/inference/v1',model:'accounts/fireworks/models/llama-v3p1-70b-instruct'},
      sambanova:{base:'https://api.sambanova.ai/v1',model:'Meta-Llama-3.1-70B-Instruct'},
      nvidia_nim:{base:'https://integrate.api.nvidia.com/v1',model:'meta/llama-3.1-70b-instruct'},
    };

    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    function cleanAnswer(s){return String(s||'').replace(/<think>[\s\S]*?<\/think>/gi,'').replace(/<\|[^|]+\|>/g,'').replace(/^data:\s*/gim,'').trim()}
    function domain(url){try{return new URL(url).hostname.replace('www.','')}catch{return url}}
    function favicon(url){return `https://www.google.com/s2/favicons?domain=${domain(url)}&sz=32`}

    function apiBase(){
      if(location.origin && location.origin!=='null')return location.origin;
      return 'http://localhost:8000';
    }
    async function api(path,method='POST',body=null){
      const opts={method,headers:{'Content-Type':'application/json'}};
      if(body&&method!=='GET')opts.body=JSON.stringify(body);
      const res=await fetch(apiBase()+path,opts);
      return res.json();
    }

    // ═══ Navigation ═══
    function goHome(){
      dom.homeView.classList.remove('hidden');
      dom.resultsArea.classList.add('hidden');
      dom.queryInput.focus();
    }

    // ═══ Settings ═══
    function openSettings(){dom.drawerOverlay.classList.remove('hidden');dom.settingsDrawer.classList.remove('hidden')}
    function closeSettings(){dom.drawerOverlay.classList.add('hidden');dom.settingsDrawer.classList.add('hidden')}
    function saveSettings(){
      localStorage.setItem('ss_provider',dom.provider.value);
      localStorage.setItem('ss_api_key',dom.apiKey.value);
      localStorage.setItem('ss_base_url',dom.baseUrl.value);
      localStorage.setItem('ss_model',dom.modelInput.value);
      localStorage.setItem('ss_llm_on',dom.enableLlm.checked?'1':'0');
      localStorage.setItem('ss_max_results',dom.maxResults.value);
    }
    function loadSettings(){
      const p=localStorage.getItem('ss_provider');
      const k=localStorage.getItem('ss_api_key');
      const u=localStorage.getItem('ss_base_url');
      const m=localStorage.getItem('ss_model');
      const l=localStorage.getItem('ss_llm_on');
      const r=localStorage.getItem('ss_max_results');
      if(p)dom.provider.value=p;
      if(k)dom.apiKey.value=k;
      if(u)dom.baseUrl.value=u;
      if(m)dom.modelInput.value=m;
      if(l!==null)dom.enableLlm.checked=l==='1';
      if(r)dom.maxResults.value=r;
      const pr=presets[dom.provider.value]||presets.cerebras;
      if(!dom.modelInput.value)dom.modelInput.value=pr.model;
      if(!dom.baseUrl.value&&pr.base)dom.baseUrl.value=pr.base;
    }
    dom.provider.addEventListener('change',()=>{
      const pr=presets[dom.provider.value]||{};
      dom.modelInput.value=pr.model||'';
      dom.baseUrl.value=pr.base||'';
      dom.modelSelect.classList.add('hidden');
      saveSettings();
    });

    // ═══ Model Fetcher ═══
    async function fetchModels(){
      const key=dom.apiKey.value.trim();
      const base=dom.baseUrl.value.trim()||(presets[dom.provider.value]||{}).base;
      if(!key||!base){alert('Enter API Key & Base URL');return}
      $('fetchBtn').textContent='...';
      try{
        const data=await api('/api/models','POST',{api_key:key,base_url:base});
        if(data?.models?.length){
          dom.modelSelect.innerHTML=data.models.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('');
          dom.modelSelect.classList.remove('hidden');
          dom.modelSelect.onchange=()=>{dom.modelInput.value=dom.modelSelect.value;saveSettings()};
          dom.modelInput.value=data.models[0];saveSettings();
        }
      }catch(e){alert('Failed: '+e.message)}
      $('fetchBtn').textContent='⟳ Fetch';
    }

    // ═══ Mode chips — FIXED: always clickable ═══
    dom.modeBar.addEventListener('click',e=>{
      const chip=e.target.closest('.mode-chip');
      if(!chip)return;
      dom.modeBar.querySelectorAll('.mode-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      focusMode=chip.dataset.mode;
      dom.statusMode.textContent=focusMode;
      // Sync topbar dropdown
      syncModeUI();
    });

    // ═══ Mode dropdown (topbar) ═══
    const modeLabels={lite:'Lite',research:'Deep Research',academic:'Academic',reddit:'Reddit',youtube:'YouTube'};
    const modeIcons={lite:'⚡',research:'🔬',academic:'🎓',reddit:'💬',youtube:'▶'};
    function toggleModeMenu(){$('modeMenu').classList.toggle('hidden')}
    function selectMode(el){
      focusMode=el.dataset.mode;
      // Update dropdown
      $('modeMenu').querySelectorAll('.mode-menu-item').forEach(i=>i.classList.remove('active'));
      el.classList.add('active');
      $('modeMenu').classList.add('hidden');
      syncModeUI();
      // Sync mode-row chips
      dom.modeBar.querySelectorAll('.mode-chip').forEach(c=>{
        c.classList.toggle('active',c.dataset.mode===focusMode);
      });
      dom.statusMode.textContent=focusMode;
    }
    function syncModeUI(){
      $('modeLabelBtn').textContent=modeLabels[focusMode]||'Lite';
      $('modeIcon').textContent=modeIcons[focusMode]||'⚡';
    }
    // Close dropdown on click outside
    document.addEventListener('click',e=>{
      if(!e.target.closest('.mode-dropdown'))$('modeMenu').classList.add('hidden');
    });

    // ═══ History ═══
    function initHistory(yes){
      dom.dbModal.classList.add('hidden');
      localStorage.setItem('ss_history_init','done');
      if(yes){historyEnabled=true;api('/api/history/enable','POST').catch(()=>{})}
    }
    function toggleHistory(){
      api('/api/history','GET').then(data=>{
        if(!data?.entries?.length){alert('No history entries yet.');return}
        const text=data.entries.slice(0,10).map(e=>`• ${e.query} (${e.sources_count} sources, ${e.timestamp})`).join('\n');
        alert('Recent History:\n\n'+text);
      }).catch(()=>alert('History not available'));
    }

    // ═══ Status bar ═══
    function startStatus(){
      searchStartTime=Date.now();
      dom.statusBar.classList.remove('hidden');
      dom.progressTrack.classList.remove('hidden');
      dom.progressFill.style.width='0%';
      dom.statusMode.textContent=focusMode;
      let pct=0;
      searchTimer=setInterval(()=>{
        const elapsed=((Date.now()-searchStartTime)/1000).toFixed(1);
        dom.statusTime.textContent=elapsed+'s';
        pct+=Math.random()*4;if(pct>92)pct=92;
        dom.progressFill.style.width=pct+'%';
      },400);
    }
    function updateStatus(text){dom.statusText.textContent=text}
    function stopStatus(){
      clearInterval(searchTimer);
      const elapsed=((Date.now()-searchStartTime)/1000).toFixed(1);
      dom.statusTime.textContent=elapsed+'s';
      dom.statusText.textContent='Done';
      dom.progressFill.style.width='100%';
      setTimeout(()=>{
        dom.statusBar.classList.add('hidden');
        dom.progressTrack.classList.add('hidden');
      },1500);
    }

    // ═══ TTS — Microsoft Edge Neural Voice (en-US-AvaNeural, from XeL Studio) ═══
    let ttsAudio=null;
    function toggleTTS(){
      if(ttsPlaying){
        if(ttsAudio){ttsAudio.pause();ttsAudio=null}
        ttsPlaying=false;
        dom.ttsBtn.classList.remove('playing');
        dom.ttsBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg><span id="ttsLabel">Listen</span>`;
        return;
      }
      if(!currentAnswer)return;

      // Clean text for TTS
      const text=currentAnswer
        .replace(/\*\*/g,'').replace(/#{1,6}\s*/g,'')
        .replace(/\[(\d+)\]/g,'').replace(/https?:\/\/\S+/g,'')
        .replace(/[`\[\]]/g,'').replace(/\n{2,}/g,'. ')
        .replace(/\n/g,' ').replace(/\s+/g,' ').trim()
        .slice(0,5000);
      if(!text)return;

      // Show loading state
      dom.ttsBtn.classList.add('playing');
      dom.ttsBtn.innerHTML=`<span class="spinner" style="width:12px;height:12px;border-width:1.5px"></span><span id="ttsLabel">Loading...</span>`;

      // Call edge-tts backend
      const url=apiBase()+'/api/tts?text='+encodeURIComponent(text);
      ttsAudio=new Audio(url);
      ttsAudio.oncanplay=()=>{
        ttsPlaying=true;
        dom.ttsBtn.innerHTML=`<div class="eq-bars"><div class="eq-bar" style="height:8px"></div><div class="eq-bar"></div><div class="eq-bar"></div></div><span id="ttsLabel">Playing</span>`;
      };
      ttsAudio.onended=()=>{
        ttsPlaying=false;
        ttsAudio=null;
        dom.ttsBtn.classList.remove('playing');
        dom.ttsBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg><span id="ttsLabel">Listen</span>`;
      };
      ttsAudio.onerror=()=>{
        ttsPlaying=false;
        ttsAudio=null;
        dom.ttsBtn.classList.remove('playing');
        dom.ttsBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg><span id="ttsLabel">Listen</span>`;
        alert('TTS unavailable. Is edge-tts installed?');
      };
      ttsAudio.play().catch(()=>{});
    }

    // ═══ Rendering ═══
    function renderSourceStrip(items){
      if(!items?.length){dom.sourcesStrip.innerHTML='';return}
      dom.sourcesStrip.innerHTML=items.slice(0,10).map((s,i)=>`
        <a class="src-chip" href="${esc(s.url)}" target="_blank" rel="noopener" style="animation-delay:${i*40}ms">
          <span class="src-num">${i+1}</span>
          <img src="${favicon(s.url)}" onerror="this.style.display='none'" />
          <span>${esc(s.title||domain(s.url))}</span>
        </a>
      `).join('');
    }
    function renderAllSources(items){
      if(!items?.length)return;
      dom.allSourcesCount.textContent=items.length;
      dom.allSourcesGrid.innerHTML=items.map((s,i)=>`
        <div class="all-src-card" style="animation:fadeUp .3s ease-out ${i*20}ms both">
          <a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title||s.url)}</a>
          <div class="meta"><span>#${i+1}</span><span>${esc(s.engine)}</span><span>${esc(domain(s.url))}</span></div>
        </div>
      `).join('');
    }
    function toggleAllSources(){dom.allSourcesGrid.classList.toggle('hidden')}

    function renderAnswer(text){
      let html=esc(text)
        .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
        .replace(/^## (.*$)/gm,'<h2>$1</h2>')
        .replace(/^### (.*$)/gm,'<h3>$1</h3>')
        .replace(/^- (.*$)/gm,'<li>$1</li>')
        .replace(/^\d+\. (.*$)/gm,'<li>$1</li>')
        .replace(/\[(\d+)\]/g,'<a href="#" style="color:var(--accent);font-size:12px;vertical-align:super">[$1]</a>')
        .replace(/\n\n/g,'</p><p>')
        .replace(/\n/g,'<br>');
      dom.answerContent.innerHTML='<p>'+html+'</p>';
    }

    // ═══ Main Search ═══
    async function runSearch(){
      const query=dom.queryInput.value.trim();
      if(!query)return;

      // Stop any TTS
      speechSynthesis.cancel();ttsPlaying=false;

      // Hide home hero, show results
      dom.homeView.classList.add('hidden');
      dom.resultsArea.classList.remove('hidden');
      dom.llmError.classList.add('hidden');
      dom.allSourcesGrid.classList.add('hidden');
      dom.ttsBtn.classList.add('hidden');
      currentAnswer='';

      // Loading states
      dom.sourcesStrip.innerHTML=Array(5).fill(0).map(()=>'<div class="src-chip" style="min-width:120px"><div class="skel" style="height:12px;width:80px;margin:0"></div></div>').join('');
      dom.answerContent.innerHTML=`<div class="answer-loading"><span class="spinner"></span> Searching and analyzing sources...</div><div class="skel w90"></div><div class="skel w70"></div><div class="skel w50"></div>`;
      dom.runBtn.disabled=true;

      saveSettings();
      startStatus();
      updateStatus(focusMode==='research'?'Deep Research: querying 90+ engines...':'Searching 90+ engines...');

      const prov=dom.provider.value;
      const key=dom.apiKey.value.trim();
      const model=dom.modelInput.value.trim();
      const base=dom.baseUrl.value.trim()||(presets[prov]||{}).base||'';
      const useLlm=dom.enableLlm.checked;

      // DEEP RESEARCH = 200 sources minimum, NOT 30
      const userMax=parseInt(dom.maxResults.value)||30;
      const maxR=(focusMode==='research')?Math.max(userMax,200):userMax;

      const payload={query,focus_mode:focusMode,max_results:maxR};

      if(useLlm&&key&&model){
        payload.llm={provider:prov,api_key:key,model,base_url:base,timeout_ms:focusMode==='research'?90000:45000};
      }

      let endpoint='/search';
      if(useLlm&&key&&model){
        endpoint=focusMode==='research'?'/search/research-llm':'/search/lite-llm';
      }

      try{
        if(focusMode==='research'&&useLlm)updateStatus('Scraping 200+ sources for deep research...');

        const data=await api(endpoint,'POST',payload);
        stopStatus();

        const sources=data.search_results||[];
        renderSourceStrip(sources);
        renderAllSources(sources);

        if(data.llm_answer){
          currentAnswer=cleanAnswer(data.llm_answer);
          renderAnswer(currentAnswer);
          dom.ttsBtn.classList.remove('hidden');
        }else if(data.llm_error){
          dom.answerContent.innerHTML='<div style="color:var(--muted);padding:20px 0">AI could not generate an answer. Browse sources above.</div>';
          dom.llmError.textContent=data.llm_error;
          dom.llmError.classList.remove('hidden');
        }else{
          dom.answerContent.innerHTML=useLlm
            ?'<div style="color:var(--muted);padding:20px 0">No AI answer returned.</div>'
            :'<div style="color:var(--muted);padding:20px 0">AI disabled. Browse sources above.</div>';
        }

        if(historyEnabled)api('/api/history','GET').catch(()=>{});

      }catch(err){
        stopStatus();
        dom.answerContent.innerHTML=`<div style="color:#f87171;padding:20px 0">Error: ${esc(err.message)}</div>`;
      }finally{
        dom.runBtn.disabled=false;
      }
    }

    // ═══ Events ═══
    dom.queryInput.addEventListener('keydown',e=>{if(e.key==='Enter')runSearch()});

    // ═══ Init ═══
    loadSettings();
    if(localStorage.getItem('ss_history_init')==='done'){
      dom.dbModal.classList.add('hidden');
      historyEnabled=!!localStorage.getItem('ss_api_key');
      if(historyEnabled)api('/api/history/enable','POST').catch(()=>{});
    }
  </script>
</body>
</html>
